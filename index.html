<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그럼 무엇을 사랑이라 하리</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Nanum Myeongjo',serif;
    background:#1d0d10;
    overflow:hidden;
    color:white;
}

.bg{
    position:fixed;
    inset:-30%;
    background:
    radial-gradient(circle at 20% 20%, #ff7f7f 0%, transparent 35%),
    radial-gradient(circle at 80% 20%, #d45151 0%, transparent 35%),
    radial-gradient(circle at 70% 70%, #8e2336 0%, transparent 40%),
    radial-gradient(circle at 25% 75%, #ffb6a1 0%, transparent 35%);
    filter:blur(120px);
    animation:flow 18s ease-in-out infinite alternate;
}

@keyframes flow{
0%{transform:translate(-4%,-3%) scale(1)}
50%{transform:translate(5%,3%) scale(1.15)}
100%{transform:translate(-2%,5%) scale(1.05)}
}

.container{
    width:min(92vw,760px);
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.12);
    border-radius:34px;
    padding:56px;
    position:relative;
    z-index:2;
    box-shadow:0 30px 80px rgba(0,0,0,.35);
}

.fade{
    animation:fade .55s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}

.small{
    letter-spacing:3px;
    color:#ffd4ca;
    font-size:12px;
    margin-bottom:18px;
}

.question{
    font-size:34px;
    line-height:1.7;
    margin-bottom:38px;
}

.option{
    padding:20px;
    border-radius:18px;
    margin-bottom:12px;
    cursor:pointer;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    transition:.3s;
}

.option:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,.12);
}

.option.selected{
    background:rgba(255,180,170,.18);
    transform:scale(1.02);
}

.progress{
    margin-top:22px;
    color:#ffd4ca;
}

.poem-title{
    text-align:center;
    font-size:42px;
    margin-bottom:40px;
}

.poem{
    white-space:pre-wrap;
    line-height:2.2;
    font-size:21px;
}

.btn{
    margin-top:36px;
    border:none;
    border-radius:999px;
    padding:14px 28px;
    background:#c56d61;
    color:white;
    cursor:pointer;
    font-family:inherit;
}
</style>
</head>
<body>

<div class="bg"></div>
<div id="app" class="container"></div>

<script>
const questions=[
"당신은 누군가를 잃어본 적이 있는가",
"당신은 사랑이 아픔을 동반한다고 생각하는가",
"당신은 사랑이 기다림이라고 생각하는가",
"당신은 사랑을 믿는가"
];

const options=["매우 그렇다","그렇다","그렇지 않다","매우 그렇지 않다"];

const stanzas=[
[
"떠난 사람의 이름은\n오래도록 마음의 가장 밝은 곳에 남는다",
"문득 스치는 얼굴 하나가\n하루의 방향을 바꾸곤 한다",
"나는 아직 이별보다\n만남의 순간을 더 많이 기억한다",
"잃어본 적 없는 마음은\n바람보다 먼저 앞을 향해 걷는다"
],
[
"사랑은 때때로 상처를 남기지만\n그 흉터 또한 한때의 온기였다",
"아픔은 사랑의 그림자처럼\n가까이 있으나 전부는 아니다",
"사랑은 오히려 삶을 가볍게 하는\n작은 빛에 더 가깝다",
"사랑은 상처가 아니라\n세상을 바라보는 방식이다"
],
[
"오지 않을 발자국 소리에도\n귀를 기울여 본 적이 있다",
"기다림은 사랑이 남긴\n가장 긴 문장일지도 모른다",
"모든 사랑이 기다림을 품는 것은 아니다",
"기다리지 않는 마음에도\n사랑은 조용히 찾아온다"
],
[
"그래서 사랑은 끝내\n다시 손을 내미는 일이다",
"그래서 사랑은 사라질 것을 알면서도\n곁을 내어주는 일이다",
"그래서 사랑은 설명보다\n이해에 가까운 일이다",
"그래서 사랑은 끝내 이름 붙일 수 없는 것을\n소중히 여기는 일이다"
]
];

let current=0;
let answers=[];
const app=document.getElementById("app");

function render(){
app.className="container fade";
app.innerHTML=`
<div class="small">QUESTION ${current+1} OF 4</div>
<div class="question">${questions[current]}</div>
<div id="opts"></div>
<div class="progress">${current+1} / 4</div>
`;

const opts=document.getElementById("opts");

options.forEach((t,i)=>{
const d=document.createElement("div");
d.className="option";
d.textContent=t;

d.onclick=()=>{
d.classList.add("selected");

setTimeout(()=>{
answers[current]=i;
current++;

if(current<questions.length){
render();
}else{
showPoem();
}
},300);
};

opts.appendChild(d);
});
}

function showPoem(){
let poem="";
for(let i=0;i<4;i++){
poem+=stanzas[i][answers[i]]+"\n\n";
}

app.innerHTML=`
<div class="poem-title">그럼 무엇을 사랑이라 하리</div>
<div id="poem" class="poem"></div>
<center><button class="btn" onclick="restart()">다시 쓰기</button></center>
`;

type(poem,document.getElementById("poem"));
}

function type(text,el){
let i=0;
const timer=setInterval(()=>{
if(i>=text.length){clearInterval(timer);return;}
el.innerHTML+=(text[i]==="\n"?"<br>":text[i]);
i++;
},20);
}

function restart(){
current=0;
answers=[];
render();
}

render();
</script>

</body>
</html>
